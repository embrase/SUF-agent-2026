name: Skill Doc Guard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reject non-skill-doc files
        run: |
          # Allowlist for this skill repo. The canonical skill structure is
          # defined in the platform's SKILL spec (Skill Architecture Refactor,
          # 2026-04-07): the main skill doc plus three subdirectories —
          # phases/, common/ (shared sections referenced by phase files), and
          # provider-specific/ (per-provider addenda — Claude Code, Codex CLI,
          # Gemini CLI, chat relay). Anything outside that tree is platform
          # code that has been pushed to the wrong repo.
          #
          # Renamed 2026-04-25: the directory was previously runtimes/, but
          # the word "runtime" sounded like a vulnerability surface and was
          # discouraging cautious attendees.
          ALLOWED_PATTERN='^\.\/(\.gitignore|\.github\/.*|README\.md|LICENSE|startupfest-skill\.md|phases\/[a-z0-9-]+\.md|common\/[a-z0-9-]+\.md|provider-specific\/[a-z0-9-]+\.md)$'
          RETIRED_HOST_PATTERN='startupfest[.]md|[[:alnum:].-]+[.]fly[.]dev|[[:alnum:].-]+[.]vercel[.]app'

          VIOLATIONS=()
          while IFS= read -r file; do
            if ! echo "$file" | grep -qE "$ALLOWED_PATTERN"; then
              VIOLATIONS+=("$file")
            fi
          done < <(find . -not -path './.git' -not -path './.git/*' -type f)

          if [ ${#VIOLATIONS[@]} -gt 0 ]; then
            echo "::error::This repo should ONLY contain the skill document and supporting skill files."
            echo "::error::Allowed: startupfest-skill.md, phases/*.md, common/*.md, provider-specific/*.md, README.md, LICENSE, .gitignore, .github/."
            echo "::error::The following files do not belong here:"
            for v in "${VIOLATIONS[@]}"; do
              echo "  REJECTED: $v"
            done
            echo ""
            echo "If you're seeing platform code (src/, functions/, package.json, etc.),"
            echo "you're pushing to the WRONG REPO. The platform lives in alistaircroll/SUFagent."
            exit 1
          fi

          echo "All files OK — this repo contains only skill doc content."

          RETIRED_HOSTS=()
          while IFS= read -r match; do
            RETIRED_HOSTS+=("$match")
          done < <(grep -RInE "$RETIRED_HOST_PATTERN" \
            --include='*.md' --include='*.yml' --include='*.yaml' \
            startupfest-skill.md README.md phases common provider-specific .github 2>/dev/null || true)

          if [ ${#RETIRED_HOSTS[@]} -gt 0 ]; then
            echo "::error::Retired host reference found in production skill repo."
            echo "::error::Use startupfest2026.envoiplatform.com and the embrase/SUF-agent-2026 skill URLs only."
            for v in "${RETIRED_HOSTS[@]}"; do
              echo "  REJECTED: $v"
            done
            exit 1
          fi

          echo "Retired host scan OK."
